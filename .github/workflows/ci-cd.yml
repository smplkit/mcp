name: CI/CD

on:
  push:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt
          pip install ruff

      - name: Lint
        run: ruff check src tests

      - name: Test with coverage
        run: pytest --cov=smplkit_mcp --cov-report=term-missing --cov-fail-under=90

  acceptance:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Acceptance tests (all eight tools vs live Jobs API)
        # Provisions an ephemeral verified account via the admin API and drives
        # every tool end-to-end (ADR-057 magic moment). Self-skips when
        # ADMIN_API_KEY is not available to this repo (it is a private-only org
        # secret, so the public repo skips; the suite runs locally and in the
        # private deploy path).
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: pytest -m acceptance -v

  # Version resolution + git tag + GitHub release stay in this (public) repo:
  # they are about this repo's own release identity and use the built-in
  # GITHUB_TOKEN, which can write here but nowhere else. semantic-release is run
  # inline (the pip tool) rather than via the smplkit/.github composite action,
  # because a public repo cannot resolve a private-repo action.
  release:
    needs: [ci, acceptance]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      app-version: ${{ steps.version.outputs.app-version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve version, tag, and release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install python-semantic-release
          git fetch --tags origin
          NEW_VERSION=$(semantic-release version --print 2>/dev/null || true)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LATEST_VERSION="${LATEST_TAG#v}"

          if [ -z "$NEW_VERSION" ] || [ "$NEW_VERSION" = "$LATEST_VERSION" ]; then
            echo "No release needed; deploying existing version ${LATEST_VERSION:-dev}"
            echo "app-version=${LATEST_VERSION:-dev}" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag collision: v${NEW_VERSION} exists but is not latest (latest: ${LATEST_TAG:-none})."
            exit 1
          else
            echo "New release: v${NEW_VERSION}"
            git tag "v${NEW_VERSION}"
            git push origin "v${NEW_VERSION}"
            gh release create "v${NEW_VERSION}" --generate-notes
            echo "app-version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          fi

  # Thin trigger: mint a tightly-scoped GitHub App token (actions:write on
  # smplkit/mcp-private only) and dispatch the privileged deploy there. No AWS,
  # Pulumi, or admin credentials — and no private-repo actions — live in this
  # public repo. If this token leaked, the most it could do is start a deploy.
  trigger-deploy:
    needs: [release]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Mint deploy-trigger App token (scoped to mcp-private)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEPLOY_TRIGGER_APP_ID }}
          private-key: ${{ secrets.DEPLOY_TRIGGER_PRIVATE_KEY }}
          owner: smplkit
          repositories: mcp-private

      - name: Dispatch deploy in smplkit/mcp-private
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run deploy.yml \
            --repo smplkit/mcp-private \
            --ref main \
            --field sha="${{ github.sha }}" \
            --field app-version="${{ needs.release.outputs.app-version }}"
