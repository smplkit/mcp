<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>smplkit MCP Server</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#a3a3a3;font-family:-apple-system,BlinkMacSystemFont,\
"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;\
justify-content:center;min-height:100vh;text-align:center}
.container{max-width:480px;padding:2rem}
.logo{width:240px;max-width:80%;height:auto;margin-bottom:1.25rem}
.product{font-size:1.35rem;font-weight:600;color:#fff;letter-spacing:-0.01em;margin-bottom:0.75rem}
.tagline{font-size:0.95rem;color:#a3a3a3;line-height:1.55;margin-bottom:0.85rem}
.available{font-size:0.85rem;color:#737373;line-height:1.5;margin-bottom:1.75rem}
.available strong{color:#f97316;font-weight:600}
.version{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:0.75rem;\
color:#525252;margin-bottom:1.75rem}
.links{list-style:none;display:flex;flex-wrap:wrap;gap:0.75rem 1.5rem;justify-content:center}
.links a{color:#525252;text-decoration:none;font-size:0.8125rem;transition:color 0.15s}
.links a:hover{color:#a3a3a3}
</style>
</head>
<body>
<div class="container">
<img class="logo" src="__LOGO_SRC__" alt="smplkit">
<div class="product">MCP Server</div>
<div class="tagline">The agent-native gateway to the smplkit platform — connect your AI \
agent once and let it operate smplkit on your behalf.</div>
<div class="available">Available now: <strong>Smpl Jobs</strong> — schedule, run, and \
monitor HTTP jobs. More of the platform to come.</div>
<div class="version" id="version"></div>
<ul class="links">
<li><a href="https://docs.smplkit.com">Documentation</a></li>
<li><a href="https://github.com/smplkit/mcp">GitHub</a></li>
<li><a href="https://www.smplkit.com">smplkit.com</a></li>
</ul>
</div>
<script>
fetch("/api/liveness").then(function(r){return r.json()}).then(function(d){
var v=(d.version||"");document.getElementById("version").textContent=v?("build "+v.substring(0,7)):"";
}).catch(function(){});
</script>
</body>
</html>
